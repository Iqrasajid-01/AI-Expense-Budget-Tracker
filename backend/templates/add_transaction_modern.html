{% extends "base_modern.html" %}

{% block title %}Add Transaction - Budget Tracker{% endblock %}

{% block content %}
<div class="main-container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- Page Header -->
            <div class="card fade-in mb-4">
                <div class="card-body text-center py-5">
                    <i class="fas fa-plus-circle" style="font-size: 4rem; color: var(--primary);"></i>
                    <h2 class="mt-3 mb-2">Add Transaction</h2>
                    <p class="text-muted">Record a new expense or income</p>
                </div>
            </div>

            <!-- Transaction Form -->
            <div class="card fade-in">
                <div class="card-body">
                    <form method="POST" action="{{ url_for('add_transaction') }}" id="transactionForm">
                        
                        <!-- Type Selection -->
                        <div class="mb-4">
                            <label class="form-label">Transaction Type</label>
                            <div class="row g-3">
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="type" id="typeExpense" value="Expense" checked>
                                    <label class="btn btn-outline-danger w-100 py-3" for="typeExpense">
                                        <i class="fas fa-arrow-up d-block mb-1" style="font-size: 1.5rem;"></i>
                                        <strong>Expense</strong>
                                    </label>
                                </div>
                                <div class="col-6">
                                    <input type="radio" class="btn-check" name="type" id="typeIncome" value="Income">
                                    <label class="btn btn-outline-success w-100 py-3" for="typeIncome">
                                        <i class="fas fa-arrow-down d-block mb-1" style="font-size: 1.5rem;"></i>
                                        <strong>Income</strong>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Amount -->
                        <div class="mb-4">
                            <label class="form-label" for="amount">Amount ($)</label>
                            <input type="number" class="form-control form-control-lg" id="amount" name="amount" 
                                   step="0.01" min="0.01" required placeholder="0.00">
                        </div>

                        <!-- Description -->
                        <div class="mb-4">
                            <label class="form-label" for="description">Description</label>
                            <input type="text" class="form-control form-control-lg" id="description" name="description" 
                                   required placeholder="e.g., Starbucks coffee, Shell gas, Monthly salary">
                            <div class="form-text">AI will auto-categorize as you type</div>
                        </div>

                        <!-- AI Suggestion -->
                        <div class="ml-suggestion" id="mlSuggestion">
                            <div class="d-flex align-items-center">
                                <i class="fas fa-robot me-2" style="font-size: 1.2rem;"></i>
                                <div>
                                    <strong>AI Suggestion:</strong> 
                                    <span id="suggestedCategory" class="ms-2">Analyzing...</span>
                                </div>
                            </div>
                        </div>

                        <!-- Category -->
                        <div class="mb-4">
                            <label class="form-label" for="category">Category</label>
                            <select class="form-select form-select-lg" id="category" name="category">
                                <option value="">-- Select Category (or let AI choose) --</option>
                                <option value="Food & Dining">🍔 Food & Dining</option>
                                <option value="Transportation">🚗 Transportation</option>
                                <option value="Housing">🏠 Housing</option>
                                <option value="Entertainment">🎬 Entertainment</option>
                                <option value="Healthcare">🏥 Healthcare</option>
                                <option value="Shopping">🛍️ Shopping</option>
                                <option value="Travel">✈️ Travel</option>
                                <option value="Education">📚 Education</option>
                                <option value="Salary">💰 Salary</option>
                                <option value="Investment">📈 Investment</option>
                                <option value="Utilities">💡 Utilities</option>
                                <option value="Personal Care">💅 Personal Care</option>
                                <option value="Insurance">🛡️ Insurance</option>
                                <option value="Debt Payment">💳 Debt Payment</option>
                                <option value="Gifts & Donations">🎁 Gifts & Donations</option>
                            </select>
                        </div>

                        <!-- Date -->
                        <div class="mb-4">
                            <label class="form-label" for="date">Date</label>
                            <input type="date" class="form-control form-control-lg" id="date" name="date" required>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-plus me-2"></i>Add Transaction
                            </button>
                            <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary btn-lg">
                                <i class="fas fa-arrow-left me-2"></i>Back to Dashboard
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let debounceTimer;
document.getElementById('date').valueAsDate = new Date();

document.getElementById('description').addEventListener('input', function(e) {
    clearTimeout(debounceTimer);
    const description = e.target.value.trim();

    if (description.length < 3) {
        document.getElementById('mlSuggestion').classList.remove('show');
        return;
    }

    debounceTimer = setTimeout(() => {
        fetch('/api/ml/categorize', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ description: description })
        })
        .then(response => response.json())
        .then(data => {
            const suggestionBox = document.getElementById('mlSuggestion');
            const suggestedCategory = document.getElementById('suggestedCategory');

            // Handle error response
            if (data.error || !data.category) {
                suggestedCategory.innerHTML = `
                    <span class="text-muted">AI suggestion unavailable</span>
                `;
                suggestionBox.classList.add('show');
                return;
            }

            // Safely handle confidence value
            const confidence = data.confidence || 0;
            const confidencePercent = (confidence * 100).toFixed(0);
            
            suggestedCategory.innerHTML = `
                <strong>${data.category}</strong>
                <span class="text-muted">(${confidencePercent}% confidence)</span>
            `;
            suggestionBox.classList.add('show');

            if (confidence > 0.7) {
                document.getElementById('category').value = data.category;
            }
        })
        .catch(error => {
            console.error('Error fetching AI suggestion:', error);
            const suggestionBox = document.getElementById('mlSuggestion');
            const suggestedCategory = document.getElementById('suggestedCategory');
            suggestedCategory.innerHTML = `
                <span class="text-muted">AI suggestion unavailable</span>
            `;
            suggestionBox.classList.add('show');
        });
    }, 500);
});
</script>
{% endblock %}
