{% extends "base_minimal.html" %}

{% block title %}Login - Budget{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="card fade-in">
            <div class="card-body p-5">
                <!-- Logo -->
                <div class="text-center mb-4">
                    <i class="fas fa-wallet text-primary" style="font-size: 3rem;"></i>
                    <h2 class="mt-3 mb-1">Welcome Back</h2>
                    <p class="text-muted">Sign in to your account</p>
                </div>

                <!-- Login Form -->
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label class="form-label" for="username">Username</label>
                        <input type="text" class="form-control" id="username" name="username" 
                               required autofocus placeholder="Enter username">
                    </div>

                    <div class="mb-4">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               required placeholder="Enter password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <i class="fas fa-sign-in-alt me-2"></i>Sign In
                    </button>
                </form>

                <!-- Register Link -->
                <div class="text-center">
                    <p class="text-muted mb-0">
                        Don't have an account? 
                        <a href="{{ url_for('register') }}" class="text-primary">Create one</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Features -->
        <div class="text-center mt-4">
            <p class="text-muted small mb-2">
                <i class="fas fa-check text-success me-1"></i> AI-powered categorization
            </p>
            <p class="text-muted small mb-2">
                <i class="fas fa-check text-success me-1"></i> Simple & clean interface
            </p>
            <p class="text-muted small">
                <i class="fas fa-check text-success me-1"></i> Track expenses easily
            </p>
        </div>
    </div>
</div>
{% endblock %}
